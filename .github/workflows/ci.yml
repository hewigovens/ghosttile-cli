name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install tools
        run: brew install just xcodegen swiftlint swiftformat

      - name: Lint
        run: just lint

      - name: Build Swift package
        run: swift build

      - name: Build CLI and dylib
        run: just build-cli

      - name: Build app bundle
        run: just build

      - name: Build debug dylib for tests
        run: |
          xcrun clang -dynamiclib -arch arm64 -framework Cocoa \
            -mmacosx-version-min=15.0 -DGHOSTHIDE_DEBUG=1 \
            -o .build/ghosthide.dylib Resources/ghosthide.m Resources/ghosthide_debug.m Resources/fishhook.c

      - name: Run tests
        run: swift test

      - name: Run UI tests
        run: just test-ui
