name: CI

on:
  push:
    branches:
      - main
      - master
      - "feature/**"
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: extensions/raycast/pnpm-lock.yaml

      - name: Install just
        run: brew install just

      - name: Build Swift package
        run: swift build

      - name: Build app bundle
        run: just build

      - name: Install Raycast extension dependencies
        working-directory: extensions/raycast
        run: pnpm install --frozen-lockfile

      - name: Typecheck Raycast extension
        working-directory: extensions/raycast
        run: pnpm run typecheck
