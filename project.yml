name: GhostTile
options:
  bundleIdPrefix: dev.hewig
  deploymentTarget:
    macOS: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    DEAD_CODE_STRIPPING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
packages:
  swift-argument-parser:
    url: https://github.com/apple/swift-argument-parser
    exactVersion: 1.7.0
  LSAppCategory:
    url: https://github.com/hewigovens/LSAppCategory
    revision: fe8edb78aaa41206e1a98b9bfbd0b0f26ed625c9
  KeyboardShortcuts:
    url: https://github.com/sindresorhus/KeyboardShortcuts
    exactVersion: 2.4.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.0
targets:
  GhostTileCore:
    type: library.static
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources/GhostTileCore
    settings:
      base:
        PRODUCT_NAME: GhostTileCore
        DEFINES_MODULE: YES
        CLANG_ENABLE_MODULE_VERIFIER: YES
        SWIFT_INSTALL_OBJC_HEADER: NO
  GhostTileApp:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources/GhostTileApp
    dependencies:
      - target: GhostTileCore
      - package: LSAppCategory
        product: LSAppCategory
      - package: KeyboardShortcuts
        product: KeyboardShortcuts
      - package: Sparkle
        product: Sparkle
    info:
      path: Resources/Info.plist
      properties:
        CFBundleDisplayName: GhostTile
        CFBundleIconName: app
        CFBundleShortVersionString: 2.0.3
        CFBundleVersion: "20"
        LSUIElement: true
        LSMinimumSystemVersion: "15.0"
        NSHighResolutionCapable: true
        NSAppleEventsUsageDescription: GhostTile needs permission to open Terminal for running commands with elevated privileges.
        SUFeedURL: https://raw.githubusercontent.com/hewigovens/ghosttile-cli/main/docs/appcast.xml
        SUPublicEDKey: UOMJSZnts1cRolglWcFAcibe9T9dD9flzz7fAQ3jmoQ=
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.hewig.ghosttile
        PRODUCT_NAME: GhostTile
        ASSETCATALOG_COMPILER_APPICON_NAME: app
    postBuildScripts:
      - path: /bin/sh
        name: Stage GhostTile Resources
        inputFiles:
          - $(PROJECT_DIR)/docs/imgs/status_menu_v.pdf
          - $(PROJECT_DIR)/docs/imgs/ghost-icon.png
          - $(PROJECT_DIR)/docs/imgs/appIcon-old.png
          - $(PROJECT_DIR)/docs/imgs/appIcon-new.png
          - $(PROJECT_DIR)/.build/ghosthide.dylib
          - $(PROJECT_DIR)/.build/release/ghosttile
        outputFiles:
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/status_menu_v.pdf
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/ghost-icon.png
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/appIcon-old.png
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/appIcon-new.png
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/ghosthide.dylib
          - $(TARGET_BUILD_DIR)/$(UNLOCALIZED_RESOURCES_FOLDER_PATH)/ghosttile-cli
        script: |
          set -euo pipefail
          resources_dir="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"
          mkdir -p "${resources_dir}"
          cp "${PROJECT_DIR}/docs/imgs/status_menu_v.pdf" "${resources_dir}/"
          cp "${PROJECT_DIR}/docs/imgs/ghost-icon.png" "${resources_dir}/"
          cp "${PROJECT_DIR}/docs/imgs/appIcon-old.png" "${resources_dir}/"
          cp "${PROJECT_DIR}/docs/imgs/appIcon-new.png" "${resources_dir}/"
          cp "${PROJECT_DIR}/.build/ghosthide.dylib" "${resources_dir}/ghosthide.dylib"
          cp "${PROJECT_DIR}/.build/release/ghosttile" "${resources_dir}/ghosttile-cli"
  ghosttile:
    type: tool
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: Sources/ghosttile
    dependencies:
      - target: GhostTileCore
      - package: swift-argument-parser
        product: ArgumentParser
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.hewig.ghosttile.cli
        PRODUCT_NAME: ghosttile
